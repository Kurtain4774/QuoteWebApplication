<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Create, find, save, and share quotes with a community of readers and writers." />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Quoted" />
    <meta property="og:description" content="Create, find, save, and share quotes with a community of readers and writers." />
    <meta property="og:image" content="%PUBLIC_URL%/og.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quoted" />
    <meta name="twitter:description" content="Create, find, save, and share quotes with a community of readers and writers." />
    <meta name="twitter:image" content="%PUBLIC_URL%/og.png" />

    <title>Quoted</title>
  </head>
  <body>
    <!--
      Runs synchronously before React renders so the correct theme class
      is on <body> before the first paint — no flash on page reload.
    -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme") || "light";
          document.body.classList.add("theme-" + theme);
          if (theme === "custom") {
            var bg = localStorage.getItem("customBg") || "#ffffff";
            var text = localStorage.getItem("customText") || "#111827";
            document.body.style.setProperty("--custom-bg", bg);
            document.body.style.setProperty("--custom-text", text);
          }
          var fs = localStorage.getItem("fontSize");
          var map = { small: "13px", medium: "15px", large: "18px" };
          if (map[fs]) document.documentElement.style.fontSize = map[fs];
        } catch (e) {}
      })();
    </script>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
